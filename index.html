<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <form>
        <div class="container">
            <div class="card">
                <p class="textGray">Acesse sua conta e acompanhe seu progresso</p>
                <div class="boxUser">
                    <label class="user">Usuário</label>
                    <div class="inputBox">
                        <input type="text" name="user" id="user" placeholder="Digite seu nome de usuário">
                        <svg class="icon" width="24" height="24" viewBox="0 0 24 24">
                            <path d="M12.0672 2C9.6678 2 7.72266 3.94514 7.72266 6.34459C7.72266 8.74404 
        9.6678 10.6892 12.0672 10.6892C14.4667 10.6892 16.4118 8.74404 
        16.4118 6.34459C16.4118 3.94514 14.4667 2 12.0672 2Z" fill="#a6a6a6" />
                            <path d="M20.25 19.453C20.2421 19.8615 19.9087 20.1895 19.5001 20.1895H4.50013C4.09157 
        20.1895 3.75818 19.8624 3.75027 19.454C3.97867 17.6258 4.22374 16.7262 
        4.73808 15.8194C5.79641 13.9537 7.92408 12.1895 12.0001 12.1895C16.0762 
        12.1895 18.2038 13.9537 19.2622 15.8194C19.7765 16.7262 20.0216 17.6258 
        20.1393 18.2937C20.2456 19.2127 20.2503 19.404 20.25 19.453Z" fill="#a6a6a6" />
                        </svg>
                    </div>
                </div>

                <div class="boxSenha">
                    <label class="senha">Senha</label>
                    <div class="inputBox">
                        <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
                        <svg class="icon icon-eye" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="#a6a6a6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12s4.5-7 10-7 10 7 10 7-4.5 7-10 7S2 12 2 12z" />
                            <circle cx="12" cy="12" r="3" />
                            <line x1="3" y1="3" x2="21" y2="21" />
                        </svg>
                    </div>
                </div>
                <button type="submit">
                    Entrar
                </button>
                <p class="textGray cadastro">Não possui cadastro? <a href="cadastroUser.html">Clique aqui</a></p>
            </div>
            <img src="./img/person.png" alt="Estudante andando">
        </div>
        </div>
    </form>
</body>

</html>
