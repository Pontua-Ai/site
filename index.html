<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="thema.css">
</head>
<body>
    <form>
        <div class="container">
            <div class="card">
                <div>
                    <div class="imgLogo">
                        <img src="./img/logo.png" alt="Logo" class="logo">
                    </div>
                    <p class="textGray">Acesse sua conta e acompanhe seu progresso</p>
                </div>
                <div class="boxUser">
                    <label class="user">Usuário</label>
                    <div class="inputBox">
                        <input type="text" name="user" id="user" placeholder="Digite seu nome de usuário">
                        <i data-feather="user" class="icon"></i>
                    </div>
                </div>

                <div class="boxSenha">
                    <label class="senha">Senha</label>
                    <div class="inputBox">
                        <input type="password" placeholder="Digite sua senha" required>
                        <svg class="icon icon-eye toggle-password" viewBox="0 0 24 24" fill="none"
                            stroke="#a6a6a6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
                            style="cursor: pointer;">
                            <path d="M2 12s4.5-7 10-7 10 7 10 7-4.5 7-10 7S2 12 2 12z" />
                            <circle cx="12" cy="12" r="3" />
                            <line class="eye-slash" x1="3" y1="3" x2="21" y2="21" />
                        </svg>
                    </div>
                </div>
                <button type="submit">
                    Entrar
                </button>
                <p class="textGray cadastro">Não possui cadastro? <a href="cadastroUser.html">Clique aqui</a></p>
            </div>
            <img class="person" src="./img/person.png" alt="Estudante andando">
        </div>
        </div>
    </form>
    <script src="password.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script>feather.replace();</script>
</body>
</html>
