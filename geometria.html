<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste atividade - Geometria</title>
    <style>
        .questao { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .opcao { display: block; margin: 5px 0; cursor: pointer; }
        .opcao:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Questões de Geometria</h1>
    <div id="questao-atual"></div>
    <div id="resultado" style="margin-top: 20px; font-size: 18px;"></div>

    <script>
        const conteudo = "geometria";
        let questoes = [];
        let questaoAtual = 0;
        let pontos = 0;
        let respostasUsuario = [];
        
        async function carregarQuestoes() {
            const response = await fetch('questoes.json');
            const dados = await response.json();
            questoes = dados[conteudo].sort(() => Math.random() - 0.5).slice(0, 10);
            mostrarQuestao();
        }
        
        function mostrarQuestao() {
            const q = questoes[questaoAtual];
            const container = document.getElementById('questao-atual');
            container.innerHTML = `
                <div class="questao">
                    <p><strong>Questão ${questaoAtual + 1} de ${questoes.length}</strong></p>
                    <p><strong>${q.pergunta}</strong></p>
                    ${q.opcoes.map((op, i) => `
                        <label class="opcao">
                            <input type="radio" name="resp" value="${i}">
                            ${op}
                        </label>
                    `).join('')}
                    <br><br>
                    <button onclick="verificarResposta()">Enviar</button>
                </div>
            `;
        }
        
        function verificarResposta() {
            const selecionada = document.querySelector('input[name="resp"]:checked');
            if (!selecionada) {
                alert('Selecione uma resposta!');
                return;
            }
            
            const q = questoes[questaoAtual];
            const respostaUsuario = parseInt(selecionada.value);
            
            respostasUsuario.push({
                pergunta: q.pergunta,
                respostaCorreta: q.resposta,
                respostaUsuario: respostaUsuario,
                opcoes: q.opcoes
            });
            
            if (respostaUsuario === q.resposta) {
                pontos++;
            }
            
            questaoAtual++;
            
            if (questaoAtual < questoes.length) {
                mostrarQuestao();
            } else {
                mostrarResultado();
            }
        }
        
        function mostrarResultado() {
            const container = document.getElementById('questao-atual');
            let html = `
                <h2>Resultado Final</h2>
                <p><strong>Pontuação: ${pontos} de ${questoes.length}</strong></p>
                <hr>
            `;
            
            respostasUsuario.forEach((r, index) => {
                const acertou = r.respostaUsuario === r.respostaCorreta;
                const status = acertou ? 'Acertou' : 'Errou';
                html += `
                    <p><strong>Questão ${index + 1}:</strong> ${status}</p>
                    <p style="margin-left: 20px;">Pergunta: ${r.pergunta}</p>
                    <p style="margin-left: 20px;">Resposta correta: ${r.opcoes[r.respostaCorreta]}</p>
                    ${!acertou ? `<p style="margin-left: 20px; color: red;">Sua resposta: ${r.opcoes[r.respostaUsuario]}</p>` : ''}
                    <br>
                `;
            });
            
            document.getElementById('resultado').innerHTML = html;
            container.innerHTML = '';
        }
        
        carregarQuestoes();
    </script>
</body>
</html>
