<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="icon" href="img/pontuaAi-icon.png">
</head>

<body>
    <div class="login">
        <div class="logo">
            <img src="img/logo-horizontal.png" alt="Logo da plataforma">
            <h2>Aprender ficou mais facil!</h2>
        </div>

        <form>
            <div class="nome">
                <label for="nome">Nome de usuario</label>
                <input type="name" name="nome" id="nome" placeholder="Como podemos te chamar?">
            </div>

            <div class="email">
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" placeholder="Digite seu endereço de email">
            </div>

            <div class="senha">
                <label for="password">Senha</label>

                <div class="input-container">
                <input type="password" id="password" placeholder="Digite sua senha">
                <i class="fa-regular fa-eye-slash password-icon"></i>
                </div>
            </div>

            <div class="senha">
                <label for="password">Confirmar senha</label>

                <div class="input-container">
                <input type="password" id="password" placeholder="Confirme sua senha">
                <i class="fa-regular fa-eye-slash password-icon"></i>
                </div>
            </div>
            <button type="submit" class="btn-continue">
                Continue &rarr;
            </button>

        </form>


        <div class="ajuda">
            <p>Já possui conta? <a href="inicio.html">Entre aqui</a> </p>
        </div>

        <script src="src/scripts/validationFom.js"></script>
</body>

</html>
