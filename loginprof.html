<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<body>
    <div class="login">
        <div class="logo"></div>
            <img src="" alt="">
        <h2>Aprender ficou mais facil!</h2>
        
        <form">
        <div class="nome">
            <label for="nome">Nome de usuario</label>
            <input type="name" name="nome" id="nome" placeholder="Como podemos te chamar?">
        </div>

        <div class="email">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="Digite seu endereço de email">
        </div>

        <div class="senha">
            <label for="senha">Senha</label>
            <input type="password" placeholder="Digite sua senha">
        </div>

        <div class="cpf">
            <label for="cpf">CPF</label>
            <input type="number" placeholder="Digite seu cpf">
        </div>

        </form>
        
        <button type="submit" class="btn-continue"> 
            Continue &rarr; 
        </button>
          <div class="ajuda">
            <p>Já possui conta? <a href="#">Entre aqui</a> </p>
    </div>
</body>
</html>
