    <link rel="stylesheet" href="src/styles/global.css">

<body>
    <header>
        <nav>
            <ul>
                <li> <img class="imagemHeader" src="img/pontuaAi-icon.png" alt="Imagem do icon da logo do site"></li>
                <li><a href="materias.html" style="color: var(--primary-color); font-weight: bold;">Materias</a></li>

    <div class="subjects-container">

        <div class="card">
            <img src="img/portugues.png" alt="Koala Portugues">

        </div>

        <div class="card">
            <img src="img/fisica.png" alt="Koala Fisico">

            <img src="img/quimica.png" alt="Koala Quimico">

        </div>

        </div>

        <div class="card">
            <img src="img/filosofia.png" alt="Koala Filosofico">
            <button class="subjects-button" id="filosofia">Filosofia</button>
        </div>

        <div class="card">
            <img src="img/sociologia.png" alt="Koala Sociologo">
            <button class="subjects-button" id="sociologia">Sociologia</button>
        </div>
