<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteudo</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/header.css">
    <link rel="stylesheet" href="src/styles/conteudoProf.css">
    <link rel="stylesheet" href="src/styles/button.css">
    <link rel="icon" href="img/cabeça.png">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li> <img class="imagemHeader" src="img/cabeça.png" alt="Imagem do icon da logo do site"></li>
                <li><a href="doc_prof.html">Doc</a></li>
                <li><a href="conteudo_prof.html" style="color: var(--primary-color); font-weight: bold;">Conteudos</a>
                </li>
                <li><a href="historico_prof.html">Histórico</a></li>
                <li><a href="conta_prof.html">Conta</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <div class="title">
            Cadastrar pergunta
        </div>

        <div class="escolher">
            <div class="selecionarMateria">
                <select id="materia" required>
                    <option value="">Máteria</option>
                </select>
            </div>

            <div class="selecionarConteudo">
                <select id="conteudo" required>
                    <option value="">Conteúdo</option>
                </select>
            </div>
        </div>

        <form id="formPergunta">
            <input type="text" id="pergunta" placeholder="Digite a pergunta">

            <div class="boxInputs">
                <input type="radio" name="alternativa" value="1" id="alt1">
                <input type="text" class="textAlternativa" placeholder="Alternativa 1">
            </div>

            <div class="boxInputs">
                <input type="radio" name="alternativa" value="2" id="alt2">
                <input type="text" class="textAlternativa" placeholder="Alternativa 2">
            </div>

            <div class="boxInputs">
                <input type="radio" name="alternativa" value="3" id="alt3">
                <input type="text" class="textAlternativa" placeholder="Alternativa 3">
            </div> 

            <div class="boxInputs">
                <input type="radio" name="alternativa" value="4" id="alt4">
                <input type="text" class="textAlternativa" placeholder="Alternativa 4">
            </div>

            <div class="boxInputs">
                <input type="radio" name="alternativa" value="5" id="alt5">
                <input type="text" class="textAlternativa" placeholder="Alternativa 5">
            </div>

            <button class="subjects-button" type="submit">Cadastrar pergunta</button>
        </form>
    </main>

    <script type="module" src="src/scripts/app.js"></script>
</body>

</html>
