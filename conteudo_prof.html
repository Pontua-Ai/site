<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perguntas</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/header.css">
    <link rel="stylesheet" href="src/styles/conteudoProf.css">
    <link rel="stylesheet" href="src/styles/button.css">
    <style>
        #fontFamilySelector {
            font-family: Arial, sans-serif;
        }
        #fontFamilySelector option[value="Arial"] { font-family: Arial, sans-serif; }
        #fontFamilySelector option[value="'Times New Roman'"] { font-family: 'Times New Roman', serif; }
        #fontFamilySelector option[value="Verdana"] { font-family: Verdana, sans-serif; }
        #fontFamilySelector option[value="'Courier New'"] { font-family: 'Courier New', monospace; }
        #fontFamilySelector option[value="Georgia"] { font-family: Georgia, serif; }
    </style>
    <link rel="icon" href="img/cabeca.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li> <img class="imagemHeader" src="img/cabeca-header.png" alt="Imagem do icon da logo do site"></li>
                <li><a href="doc_prof.html">Doc</a></li>
                <li><a href="conteudo_prof.html" style="color: var(--primary-color); font-weight: bold;">Perguntas</a>
                </li>
                <li><a href="prova_prof.html">Prova</a></li>
                <li><a href="historico_prof.html">Histórico</a></li>
                <li><a href="conta_prof.html">Conta</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <div class="title">
            Cadastrar pergunta
        </div>

        <div class="escolher">
            <div class="selecionarMateria">
                <select id="materia" required>
                    <option disabled selected hidden value="">Máteria</option>
                </select>
            </div>

            <div class="selecionarConteudo">
                <select id="conteudo" required>
                    <option value="">Conteúdo</option>
                </select>
            </div>
        </div>

        <form id="formPergunta">
            <div id="editor-container" style="height: auto; min-height: 150px;"></div>
            <input type="hidden" id="fontColor" name="fontColor">
            <input type="hidden" id="fontFamily" name="fontFamily" value="Arial">
            <input type="hidden" id="pergunta" name="pergunta">

            <div class="boxInputs">
                <input class="checkmark" type="radio" name="alternativa" value="1" id="alt1">
                <input type="text" class="textAlternativa" placeholder="Alternativa 1">
            </div>

            <div class="boxInputs">
                <input class="checkmark" type="radio" name="alternativa" value="2" id="alt2">
                <input type="text" class="textAlternativa" placeholder="Alternativa 2">
            </div>

            <div class="boxInputs">
                <input class="checkmark" type="radio" name="alternativa" value="3" id="alt3">
                <input type="text" class="textAlternativa" placeholder="Alternativa 3">
            </div> 

            <div class="boxInputs">
                <input class="checkmark" type="radio" name="alternativa" value="4" id="alt4">
                <input type="text" class="textAlternativa" placeholder="Alternativa 4">
            </div>

            <div class="boxInputs">
                <input class="checkmark" type="radio" name="alternativa" value="5" id="alt5">
                <input type="text" class="textAlternativa" placeholder="Alternativa 5">
            </div>

            <button class="subjects-button" type="submit">Cadastrar pergunta</button>
        </form>
    </main>

    <script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
    <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.7/quill.snow.css">
    <script type="module" src="src/scripts/app.js"></script>
</body>

</html>
