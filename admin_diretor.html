<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gerenciar Usuários</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/header.css">
    <link rel="stylesheet" href="src/styles/admin.css">
    <link rel="icon" href="img/cabeca.png">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><img class="imagemHeader" src="img/cabeca-header.png" alt="Logo"></li>
                <li><a href="admin_diretor.html" style="color: var(--primary-color); font-weight: bold;">Gerenciar Usuários</a></li>
                <li><a href="inicio.html">Sair</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Gerenciar Usuários</h1>
        
        <div class="filtros">
            <input type="text" id="buscaUsuario" placeholder="Buscar por nome ou email">
            <select id="filtroTipo">
                <option value="todos">Todos</option>
                <option value="aluno">Alunos</option>
                <option value="professor">Professores</option>
            </select>
        </div>

        <div class="tabela-container">
            <table>
                <thead>
                    <tr>
                        <th>Usuário</th>
                        <th>Email</th>
                        <th>Tipo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaUsuarios">
                </tbody>
            </table>
        </div>
    </main>

    <script type="module" src="src/scripts/adminDiretor.js"></script>
</body>
</html>
