<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="global.css">
    <link rel="icon" href="img/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="historico.css">
</head>

<body>
    <header>

        <img src="img/Logo.png" alt="Logo">

        <hr>

        <div class="menu">

            <div class="materia">
                <a href="materias.html">
                    <i class="fa-solid fa-book"></i>
                    <span>Matérias</span>
                </a>
            </div>

            <div class="conteudo">
                <a href="conteudos.html">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Conteudos</span>
                </a>
            </div>

            <div class="historic">
                <a href="historico.html">
                    <i class="fa-solid fa-hourglass"></i>
                    <span>Histórico</span>
                </a>
            </div>

            <div class="estatisticas">
                <a href="estatistica.html">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Estatisticas</span>
                </a>
            </div>

            <div class="dicas">
                <a href="dicas.html">
                    <i class="fa-solid fa-lightbulb"></i>
                    <span>Dicas</span>
                </a>
            </div>

            <div class="sobre">
                <a href="sobre.html">
                    <i class="fa-solid fa-circle-info"></i>
                    <span>Sobre</span>
                </a>
            </div>

        </div>

        <hr>
        <a href="conta.html">
            <i class="fa-solid fa-user"></i>
            conta
        </a>
    </header>
    <main>
        <div class="principal">
            <i class="fa-solid fa-hourglass"></i>
            <span class="title">Histórico de atividades e redações</span>
        </div>

        <div class="search">
            <div class="searchTheme">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input class="boxSearch" type="text" placeholder="Buscar por tema. . .">
                <i class="fa-solid fa-x"></i>
            </div>

            <div class="searchCategory">
                <span class="subtitle">Buscar categoria:</span>
                <select>
                    <option value="redacao">Redação</option>
                    <option value="atividades">Atividades</option>
                </select>
            </div>
        </div>
    </main>
</body>

</html>
