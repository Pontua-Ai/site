<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login aluno</title>
</head>
<body>
    <div class="login">
        <div class="logo">
            <img src="">
            <h2>Aprender ficou mais facil</h2>
        </div>

        <form action="">
            <div class="nome">
                <label for="name">Nome de usuario</label>
                <input type="nome" name="nome" id="nome" placeholder="Como podemos te chamar?">
            </div>
        
            <div class="email">
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" placeholder="Digite seu E-mail">
            </div>

            
            <div class="senha">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn-continue"> 
                Continue &rarr; 
            </button>
            
            <div class="ajuda">
                <label for="ajuda">Já possui conta? </label>
                <a href="#">Entre aqui</a>
                
            </div>
        </form>
    </div>

</body>
</html>
