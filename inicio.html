<!DOCTYPE html>
<html lang="PT-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inicio</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body>
    <div class="login">
        <div class="logo">
            <img src="img/logo-horizontal.png" alt="Logo da plataforma">
            <h2>Bem vindo de volta</h2>
        </div>
        
        <form>
        <div class="entrar">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="Digite seu E-mail">
        </div>

        <div class="senha">
            <label for="password">Senha</label>

            <div class="input-container">
            <input type="password" id="password" placeholder="Digite sua senha">
            <i class="fa-regular fa-eye-slash password-icon"></i>
            </div>
        </div>

        <button type="submit" class="btn-continue"> 
            Continue &rarr; 
        </button>
        </form>

        <div class="ajuda">
            <p>Ainda não possui conta? <a href="#">Cadastre-se gratuitamente</a> </p>
            <p>Logar como professor? <a href="cadastro-professor.html"> Clique aqui</a> </p>
            <a href="#">Esqueceu a senha?</a>
            
        </div>
    </div>

    <script src="src/scripts/validationFom.js"></script>
</body>
</html>
