<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste IA - PontuaAi</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="header.css">
    <style>

        body{
            background-color: #666;
        }
        .teste-container {
            padding: 40px;
            max-width: 800px;
        }
        .teste-container textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .teste-container button {
            background-color: var(--primary);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .teste-container button:hover {
            opacity: 0.9;
        }
        #resposta {
            margin-top: 30px;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
            white-space: pre-wrap;
            min-height: 100px;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <main>
        <div class="teste-container">
            <h1>Teste da IA</h1>
            <p>Digite um texto ou pedido para a IA:</p>
            
            <textarea id="input-ia" placeholder="Ex: Escreva uma redação sobre sustentabilidade..."></textarea>
            <p id="contador">Faltam 200 caracteres</p>
            
            <button onclick="testarIA()">Corrigir Redação ENEM</button>
            
            <div id="resposta"></div>
        </div>
    </main>

    <script src="iaRedacao.js"></script>
    <script>
        const textarea = document.getElementById("input-ia");
        const contador = document.getElementById("contador");

        textarea.addEventListener("input", () => {
            const restantes = 200 - textarea.value.length;
            if (restantes > 0) {
                contador.textContent = `Faltam ${restantes} caracteres`;
                contador.style.color = "#fff";
            }
        });

        async function testarIA() {
            const input = document.getElementById("input-ia").value;
            const respostaDiv = document.getElementById("resposta");
            
            if (input.trim().length < 200) {
                respostaDiv.innerText = "Mínimo de 200 caracteres necessários.";
                return;
            }
            
            respostaDiv.innerHTML = "<span class='loading'>Enviando para a IA...</span>";
            
            const resultado = await corrigirRedacao(input);
            respostaDiv.innerText = resultado;
        }
    </script>
</body>
</html>
